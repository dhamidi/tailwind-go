{{define "title"}}Login{{end}}
{{define "content"}}
<section class="max-w-md mx-auto px-4 py-16 animate-fade-in">
    <h1 class="text-3xl font-black tracking-tight text-gray-900 dark:text-white mb-8 text-center">Login</h1>
    {{if .LoginError}}
    <div class="mb-6 p-4 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 text-sm font-semibold">
        {{.LoginError}}
    </div>
    {{end}}
    <form method="POST" action="/login" class="space-y-6">
        <div>
            <label for="username" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Username</label>
            <input type="text" id="username" name="username" required
                class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2.5 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-violet-500">
        </div>
        <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Password</label>
            <input type="password" id="password" name="password" required
                class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2.5 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-violet-500">
        </div>
        <button type="submit"
            class="w-full px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 shadow-lg hover:shadow-xl transition-all duration-200 text-sm">
            Sign In
        </button>
    </form>
</section>
{{end}}
